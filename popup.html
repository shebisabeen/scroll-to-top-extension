<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scroll to Top</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="container">

      <!-- Header -->
      <div class="header">
        <div class="logo">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
               stroke-linejoin="round">
            <polyline points="18 15 12 9 6 15"></polyline>
          </svg>
        </div>
        <div class="header-text">
          <h1 class="title">Scroll to Top</h1>
          <p class="subtitle">Floating button for every page</p>
        </div>
      </div>

      <!-- Toggle switch -->
      <div class="toggle-row" id="toggle-row">
        <span class="toggle-label">Enable on this site</span>
        <label class="switch" aria-label="Toggle extension">
          <input type="checkbox" id="toggle" checked />
          <span class="slider"></span>
        </label>
      </div>

      <!-- Diagnostics card -->
      <div class="diag-card" id="diag-card">
        <div class="diag-icon" id="diag-icon">⏳</div>
        <div class="diag-body">
          <p class="diag-title" id="diag-title">Checking…</p>
          <p class="diag-detail" id="diag-detail">Analysing this page</p>
        </div>
      </div>

      <!-- Scroll progress bar (shown only when active) -->
      <div class="scroll-row" id="scroll-row" style="display:none">
        <div class="scroll-label-row">
          <span class="scroll-label">Scroll progress</span>
          <span class="scroll-value" id="scroll-value">0 / 300 px</span>
        </div>
        <div class="scroll-bar-track">
          <div class="scroll-bar-fill" id="scroll-bar-fill" style="width:0%"></div>
        </div>
      </div>

      <!-- GitHub footer -->
      <a class="github-link" id="github-link" href="#" title="View source on GitHub">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57
            0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695
            -.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99
            .105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225
            -.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405
            c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225
            0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3
            0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
        </svg>
        <span>shebisabeen/scroll-to-top-extension</span>
        <svg class="ext-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
          <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
      </a>

    </div>
    <script src="popup.js"></script>
  </body>
</html>
